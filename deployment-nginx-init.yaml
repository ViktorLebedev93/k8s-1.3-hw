apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-init-deployment
  labels:
    app: nginx-init
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-init
  template:
    metadata:
      labels:
        app: nginx-init
    spec:
      initContainers:
      - name: init-check-service
        image: busybox:latest
        command: 
        - sh
        - -c
        - |
          echo "Waiting for service DNS to be resolvable..."
          until nslookup nginx-init-service | grep -q "Address:"; do
            echo "Service DNS not ready, waiting 2 seconds..."
            sleep 2
          done
          echo "Service DNS is ready! Starting nginx..."
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
